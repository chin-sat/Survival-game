<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survivor Arena - Production Edition</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <!-- Real-time HUD -->
    <div id="uiLayer">
        <div class="hud-row">
            <div id="scoreHUD">Time: 0s</div>
            <div id="levelHUD">Lv. 1</div>
            <div id="healthHUD" style="color: #ff4757;">HP: 100/100</div>
        </div>
        <div id="xpBarContainer">
            <div id="xpBarFill"></div>
        </div>
    </div>

    <!-- Portal Readiness Control Hooks (Managed by css/style.css classes) -->
    <div class="ctrl-btns" style="position: absolute; top: 50px; right: 15px; display: flex; gap: 10px; pointer-events: auto; z-index: 12;">
        <button id="pauseBtn">⏸ Pause</button>
        <button id="muteBtn">🔊 Mute</button>
    </div>

    <!-- Touch Interface Joystick Layer -->
    <div id="touchJoystickZone">
        <div id="joystickKnob"></div>
    </div>

    <!-- Tutorial Entry Blanket Overlay -->
    <div id="tutorialOverlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; z-index: 8; text-align: center; transition: opacity 0.5s ease;">
        <h2 style="color: #ffff00; font-size: calc(18px + 1vw); margin: 0 0 10px 0;">SURVIVAL RULES</h2>
        <p style="margin: 5px; font-size: calc(12px + 0.5vw);">💻 Keyboard: Move with WASD / Arrow Keys</p>
        <p style="margin: 5px; font-size: calc(12px + 0.5vw);">📱 Mobile: Drag Left Touch-Joystick</p>
    </div>

    <!-- Pause Window Modal Layout -->
    <div id="pauseScreen" class="overlay">
        <h1>GAME PAUSED</h1>
        <p class="subtitle">Take a breath, Survivor.</p>
        <button id="resumeBtn" class="action-btn">Resume Game</button>
    </div>

    <!-- Level Up Interface Overlay -->
    <div id="levelUpScreen" class="overlay">
        <h1>LEVEL UP!</h1>
        <p class="subtitle">Select a modification upgrade</p>
        <div id="upgradeOptions"></div>
    </div>

    <!-- Game Over Screen Display -->
    <div id="gameOverScreen" class="overlay">
        <h1>ARENA DEFEAT</h1>
        <p id="finalScore" class="subtitle"></p>
        <button id="restartBtn" class="action-btn">Re-enter Arena</button>
    </div>
</div>

<!-- Core Game Modules Dependency Chain -->
<script src="js/Upgrades.js"></script>
<script src="js/XpGem.js"></script>
<script src="js/Projectile.js"></script>
<script src="js/Enemy.js"></script>
<script src="js/FX.js"></script>
<script src="js/AudioFX.js"></script>
<script src="js/Player.js"></script>
<script src="js/GameBase.js"></script>
<script src="js/GameSystems.js"></script>

</body>
</html>
